<body>
    <!DOCTYPE html>
<html>
<head>
<title>Click Counter</title>
</head>

<body>

<h2>Button Click Counter</h2>

<button onclick="countClick()">Click Me</button>

<p id="count">Total Clicks:0</p>

<script>
let count = 0;

function countClick() {
    count++;
    document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
</body>
</html>
